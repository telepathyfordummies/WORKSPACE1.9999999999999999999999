!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WORKSPACE</title>
  <link rel="stylesheet" href="style.css">
   <!-- Google Font import -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
</head>
<body>
  <div id="scene-wrapper">
    <div id="scene">
      <!-- BACKGROUND -->
      <img id="wall" src="wall.png" alt="Wall">
      <img id="window" src="window.png" alt="Window">

      <!-- DESK -->
      <img id="desk" src="desk1.png" alt="Desk">
      <img id="breakpoint" src="breakpoint.png" alt="boardwalk ticket">

      <!-- MONITOR -->
      <div id="monitor-wrapper">
        <img id="monitor-shell" src="computer.png" alt="Monitor">
        <img id="monitor-on" src="monitoron.png" alt="Monitor On">
        <div id="monitor-screen" class="off"><div id="output"></div></div>

  <!-- Monitor overlay for Desk One -->
<div id="monitor-overlay-one" class="monitor-overlay hidden"></div>

<!-- Monitor overlay for Desk Other -->
<div id="monitor-overlay-other" class="monitor-overlay hidden"></div>
<div id="monitor-video-overlay" class="monitor-overlay-video">
  <video id="video-rickroll" class="monitor-video" autoplay controls></video>
  <!-- other videos as them come here-->
</div>

      </div>

      <!-- INPUT -->
      <img id="input-bg" src="textframe.png" alt="Input Bar Background">
      <img id="input-bar" src="textbar.png" alt="Input Bar">
      <input type="text" id="real-input" placeholder=" ">

      <img id="submit-red" src="redbutton.png" alt="Submit Button">
      <img id="submit-green" src="greenbutton.png" alt="Submit Button Green" class="hidden">



   

  <!-- AUDIOOOOOO!!! -->
  <audio id="thunder-audio" src="assets/audio/thunder-audio.mp3" preload="auto"></audio>

  <!-- Ambient Audio Speicifcally, yes I'm separating them *dear self, you fucked thisup. they're currently stacked. but it works so worry about this in the future or maybe don't...*-->
<audio id="ambient-one" src="assets/audio/one-ambient.mp3" preload="auto" loop></audio>
<audio id="ambient-other" src="assets/audio/other-ambient.mp3" preload="auto" loop></audio>



  <!-- IF YOU'RE IN HERE YOU'RE NOSY AS FUCK. STOP IT!!!!! STOP DOING THAT!!! BEHAVE!!!! -->

      <!-- INFO MODAL -->
<div id="info-modal" class="hidden">
  <div class="modal-content">

    <button id="modal-close">✕</button>

    <img id="modal-image" src="" alt="">

    <div id="modal-text"></div>

  </div>
</div>
      
      
<!-- JS -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  // --- DOM ELEMENTS ---
  const ambientOne = document.getElementById('ambient-one');
  const ambientOther = document.getElementById('ambient-other');
  const powerBtn = document.getElementById('power-btn');
  const monitorOn = document.getElementById('monitor-on');
  const input = document.getElementById('real-input');
  const redBtn = document.getElementById('submit-red');
  const greenBtn = document.getElementById('submit-green');

  const nameplateOne = document.getElementById('nameplate-one');
  const nameplateOther = document.getElementById('nameplate-other');
  const extrasOne = document.getElementById('extras-one');
  const extrasOther = document.getElementById('extras-other');

  const monitorOverlayOne = document.getElementById('monitor-overlay-one');
  const monitorOverlayOther = document.getElementById('monitor-overlay-other');

  const backgroundOther = document.getElementById('background-other');
  const thunderAudio = new Audio('assets/audio/thunder-audio.mp3');
  thunderAudio.volume = 0.3;

  let isMonitorOn = false;
  let ambientStarted = false;
  let stormTimeout;


  // HELLOOOOO YOUR RESPONSES GO HERE!!! IF YOU ARE READING THIS AND YOU ARE NOT ME, TELEPATHYFORDUMMIES, GET THE FUCK OUT!!!!! YOU'RE CHEATING!!! I KNOW WHAT YOU ARE!!!!!!!
const modalData = {

  tweek: {
    image: "assets/popups/tweek.png",
    text: "The Resonant"
  },

  craig: {
    image: "assets/popups/craig.png",
    text: "Bearer of Calm"
  },

  wendy: {
    image: "assets/popups/wendy.png",
    text: "Maiden of Silence"
  }

  // add more entries here

};

// --- AMBIENT AUDIO & STORM ---
  function startAmbient() {
    if (ambientStarted) return;
    ambientStarted = true;

    ambientOne.volume = 0.1;
    ambientOther.volume = 0.1;

    ambientOne.play().catch(() => {});
    ambientOther.play().catch(() => {});

    // Start lightning storm after first interaction
    scheduleStorm();
  }

  // --- LIGHTNING STORM ---
  if (backgroundOther) backgroundOther.style.display = 'none';

  function triggerLightning() {
    if (!isMonitorOn || nameplateOther.classList.contains('hidden') || !backgroundOther) return;

    backgroundOther.style.display = 'block';
    backgroundOther.classList.add('lightning-flash');

    if (Math.random() < 0.6 && thunderAudio) {
      thunderAudio.volume = Math.random() * 0.5 + 0.3;
      thunderAudio.currentTime = 0;
      thunderAudio.play().catch(() => {});
    }

    setTimeout(() => {
      backgroundOther.classList.remove('lightning-flash');
      backgroundOther.style.display = 'none';
    }, 250);
  }

  function scheduleStorm() {
    if (stormTimeout) clearTimeout(stormTimeout);

    if (!isMonitorOn || nameplateOther.classList.contains('hidden')) return;

    const randomDelay = Math.random() * 5000 + 15000; // 15–20s

    stormTimeout = setTimeout(() => {
      if (!isMonitorOn || nameplateOther.classList.contains('hidden')) return;
      triggerLightning();
      scheduleStorm();
    }, randomDelay);
  }

  function updateStorm() {
    if (!isMonitorOn || nameplateOther.classList.contains('hidden')) {
      if (stormTimeout) clearTimeout(stormTimeout);
    } else {
      scheduleStorm();
    }
  }

  // --- POWER BUTTON ---
  powerBtn.addEventListener('click', () => {
    // Start ambient audio and storm on first user interaction
    startAmbient();

    isMonitorOn = !isMonitorOn;
    monitorOn.classList.toggle('hidden', !isMonitorOn);
    input.disabled = !isMonitorOn;
    redBtn.style.pointerEvents = isMonitorOn ? 'auto' : 'none';

    // reset overlays when turning off
    if (!isMonitorOn) {
      input.value = '';
      monitorOverlayOne.style.display = 'none';
      monitorOverlayOther.style.display = 'none';
      monitorOverlayOne.textContent = '';
      monitorOverlayOther.textContent = '';
    } else {
      // show overlay for active desk
      if (nameplateOther.classList.contains('hidden')) {
        monitorOverlayOne.style.display = 'flex';
      } else {
        monitorOverlayOther.style.display = 'flex';
      }
    }

    // little thunder effect when turning on
    thunderAudio.currentTime = 0;
    thunderAudio.play().catch(() => {});
  });

  // --- SUBMIT BUTTON ---
 redBtn.addEventListener('click', () => {

  const normalized =
    input.value.trim().toLowerCase();

  const response =
    deskOneResponses[normalized];

  if (!response) {

    showModal(
      "assets/popups/not-found.png",
      "[INPUT NOT FOUND.]"
    );

    input.value = '';
    return;
  }

  const popup =
    modalData[normalized];

  if (popup) {

    showModal(
      popup.image,
      popup.text
    );

  } else {

    showModal(
      "assets/popups/default.png",
      response
    );

  }

  input.value = '';
});

    redBtn.classList.add('hidden');
    greenBtn.classList.remove('hidden');

    if (nameplateOther.classList.contains('hidden')) {
      monitorOverlayOne.style.display = 'flex';
      monitorOverlayOne.innerHTML = deskOneResponses[normalized] || "[INPUT NOT FOUND.]";
    } else {
      monitorOverlayOther.style.display = 'flex';
      monitorOverlayOther.innerHTML = deskOtherResponses[normalized] || "[INPUT NOT FOUND.]";
    }

    setTimeout(() => {
      redBtn.classList.remove('hidden');
      greenBtn.classList.add('hidden');
    }, 500);

    input.value = '';
  });


  // --- NAMEPLATE TOGGLE ---
  nameplateOne.addEventListener('click', () => {
    nameplateOne.classList.add('hidden');
    nameplateOther.classList.remove('hidden');
    extrasOne.classList.add('hidden');
    extrasOther.classList.remove('hidden');

    monitorOverlayOne.style.display = 'none';
    monitorOverlayOther.style.display = isMonitorOn ? 'flex' : 'none';
    updateStorm();
  });

  nameplateOther.addEventListener('click', () => {
    nameplateOther.classList.add('hidden');
    nameplateOne.classList.remove('hidden');
    extrasOther.classList.add('hidden');
    extrasOne.classList.remove('hidden');

    monitorOverlayOther.style.display = 'none';
    monitorOverlayOne.style.display = isMonitorOn ? 'flex' : 'none';
    updateStorm();
  });

  // --- MODAL STUFF

  function showModal(imageSrc, text) {

  document.getElementById("modal-image").src = imageSrc;
  document.getElementById("modal-text").innerHTML = text;

  document
    .getElementById("info-modal")
    .classList.remove("hidden");
}

function closeModal() {

  document
    .getElementById("info-modal")
    .classList.add("hidden");
}

document
  .getElementById("modal-close")
  .addEventListener("click", closeModal);

 // --- POPUPS AND SOUNDS PLEASE GOD LET THIS WORK UGHEFWS IM TIRED!!---
function showPopup(elementId) {
  const existingPopup = document.getElementById('current-popup');
  if (existingPopup) existingPopup.remove();

  const popup = document.createElement('img');
  popup.id = 'current-popup';
  popup.src = `assets/shared/${elementId}-popup.png`;
  popup.style.position = 'fixed';
  popup.style.top = '30%';
  popup.style.left = '30%';
  popup.style.transform = 'translate(-30%, -30%)';
  popup.style.zIndex = '600';
  popup.style.width = '30vw';
  popup.style.height = 'auto';
  popup.style.cursor = 'pointer';
  popup.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
  popup.addEventListener('click', () => popup.remove());

  document.body.appendChild(popup);
}

// --- SOUNDS ---
const pageCollectAudio = new Audio('assets/audio/page-collect.mp3');
pageCollectAudio.volume = 0.4;

const drawerOpenAudio = new Audio('assets/audio/drawer-open.mp3');
drawerOpenAudio.volume = 0.4;

  // --- VIDEO OUTPUT ---
  const video = document.createElement('video');
video.src = 'assets/outputs/rickroll.mp4';
video.autoplay = true;
video.controls = true;
video.volume = 1; // full volume

// --- INTERACTIVE ELEMENTS ---
const interactiveElements = [
  'rock', 'books', 'drawer-clickable-one',
  'crystal-ball', 'dice', 'pendant', 'hummels', 'hummels2', 'drawer-clickable-other'
];

interactiveElements.forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;

  el.addEventListener('click', () => {

    // Determine active desk
    const isDeskOneActive = !nameplateOne.classList.contains('hidden');
    const isDeskOtherActive = !nameplateOther.classList.contains('hidden');

    // Block interaction if wrong desk
    if ((id.includes('-one') && !isDeskOneActive) ||
        (id.includes('-other') && !isDeskOtherActive)) {
      return;
    }

    // Play correct sound
    if (id === 'drawer-clickable-one' || id === 'drawer-clickable-other') {
      drawerOpenAudio.currentTime = 0;
      drawerOpenAudio.play().catch(() => {});
    } else {
      pageCollectAudio.currentTime = 0;
      pageCollectAudio.play().catch(() => {});
    }

    // Show popup
    showPopup(id);
  });
  });
});

</script>
