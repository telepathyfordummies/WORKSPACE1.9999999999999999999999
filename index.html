// --- AMBIENT AUDIO & STORM ---
  function startAmbient() {
    if (ambientStarted) return;
    ambientStarted = true;

    ambientOne.volume = 0.1;
    ambientOther.volume = 0.1;

    ambientOne.play().catch(() => {});
    ambientOther.play().catch(() => {});

    // Start lightning storm after first interaction
    scheduleStorm();
  }

  // --- LIGHTNING STORM ---
  if (backgroundOther) backgroundOther.style.display = 'none';

  function triggerLightning() {
    if (!isMonitorOn || nameplateOther.classList.contains('hidden') || !backgroundOther) return;

    backgroundOther.style.display = 'block';
    backgroundOther.classList.add('lightning-flash');

    if (Math.random() < 0.6 && thunderAudio) {
      thunderAudio.volume = Math.random() * 0.5 + 0.3;
      thunderAudio.currentTime = 0;
      thunderAudio.play().catch(() => {});
    }

    setTimeout(() => {
      backgroundOther.classList.remove('lightning-flash');
      backgroundOther.style.display = 'none';
    }, 250);
  }

  function scheduleStorm() {
    if (stormTimeout) clearTimeout(stormTimeout);

    if (!isMonitorOn || nameplateOther.classList.contains('hidden')) return;

    const randomDelay = Math.random() * 5000 + 15000; // 15–20s

    stormTimeout = setTimeout(() => {
      if (!isMonitorOn || nameplateOther.classList.contains('hidden')) return;
      triggerLightning();
      scheduleStorm();
    }, randomDelay);
  }

  function updateStorm() {
    if (!isMonitorOn || nameplateOther.classList.contains('hidden')) {
      if (stormTimeout) clearTimeout(stormTimeout);
    } else {
      scheduleStorm();
    }
  }

function showPopup(elementId) {
  const existingPopup = document.getElementById('current-popup');
  if (existingPopup) existingPopup.remove();

  const popup = document.createElement('img');
  popup.id = 'current-popup';
  popup.src = `assets/shared/${elementId}-popup.png`;
  popup.style.position = 'fixed';
  popup.style.top = '30%';
  popup.style.left = '30%';
  popup.style.transform = 'translate(-30%, -30%)';
  popup.style.zIndex = '600';
  popup.style.width = '30vw';
  popup.style.height = 'auto';
  popup.style.cursor = 'pointer';
  popup.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
  popup.addEventListener('click', () => popup.remove());

  document.body.appendChild(popup);
}

  const el = document.getElementById(id);
  if (!el) return;

  el.addEventListener('click', () => {

    // Determine active desk
    const isDeskOneActive = !nameplateOne.classList.contains('hidden');
    const isDeskOtherActive = !nameplateOther.classList.contains('hidden');

    // Block interaction if wrong desk
    if ((id.includes('-one') && !isDeskOneActive) ||
        (id.includes('-other') && !isDeskOtherActive)) {
      return;
    }

    // Play correct sound
    if (id === 'drawer-clickable-one' || id === 'drawer-clickable-other') {
      drawerOpenAudio.currentTime = 0;
      drawerOpenAudio.play().catch(() => {});
    } else {
      pageCollectAudio.currentTime = 0;
      pageCollectAudio.play().catch(() => {});
    }

    // Show popup
    showPopup(id);
  });
  });
});

</script>
