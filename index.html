<script>
document.addEventListener('DOMContentLoaded', () => {

    ambientOther.volume = 0.1;

    ambientOne.play().catch(() => {});
    ambientOther.play().catch(() => {});

    scheduleThunder();
  }


  // --- RANDOM THUNDER ---
  function scheduleThunder() {

    const randomDelay = Math.random() * 900000 + 700000;
    // 10-40 seconds

    setTimeout(() => {

      thunderAudio.volume = Math.random() * 0.5 + 0.3;
      thunderAudio.currentTime = 0;

      thunderAudio.play().catch(() => {});

      scheduleThunder();

    }, randomDelay);

  }



  // Start audio after first interaction
  document.addEventListener('click', startAmbient, { once: true });
  
// --- POPUP SOUNDS SPECIFICALLY ---

popupAudio.play().catch(() => {});

showModal(

  // --- MODAL ---
function showModal(imageSrc, text, title = "???", small = false) {

  const modal = document.getElementById("info-modal");

  if (small) {
    modal.classList.add("small-modal");
  } else {
    modal.classList.remove("small-modal");
  }

  document.getElementById("modal-title").innerHTML = title;

  const modalImage = document.getElementById("modal-image");

if (imageSrc) {
  modalImage.src = imageSrc;
  modalImage.style.display = "block";
} else {
  modalImage.style.display = "none";
}

  document.getElementById("modal-text").innerHTML = text;

  document
    .getElementById("info-modal")
    .classList.remove("hidden");

}


function closeModal() {

  const modal = document.getElementById("info-modal");

  modal.classList.add("hidden");

  modal.classList.remove("small-modal");

  document.getElementById("modal-title").innerHTML = "???";

  document.getElementById("modal-image").style.display = "block";

}

 

  document
    .getElementById("modal-close")
    .addEventListener("click", closeModal);



  // --- POPUPS ---
  function showPopup(elementId) {

    const existingPopup =
      document.getElementById('current-popup');

    if (existingPopup)
      existingPopup.remove();


    const popup =
      document.createElement('img');


    popup.id = 'current-popup';

    popup.src =
      `assets/shared/${elementId}-popup.png`;

    popup.style.position = 'fixed';
    popup.style.top = '30%';
    popup.style.left = '30%';
    popup.style.transform =
      'translate(-30%, -30%)';

    popup.style.zIndex = '600';
    popup.style.width = '30vw';
    popup.style.height = 'auto';
    popup.style.cursor = 'pointer';

    popup.style.boxShadow =
      '0 0 20px rgba(0,0,0,0.5)';


    popup.addEventListener('click', () => {
      popup.remove();
    });


    document.body.appendChild(popup);
