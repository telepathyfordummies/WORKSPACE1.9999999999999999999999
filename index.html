<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WORKSPACE</title>
  <link rel="stylesheet" href="style.css">
   <!-- Google Font import -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
</head>
<body>
  <div id="scene-wrapper">
    <div id="scene">
      <!-- BACKGROUND -->
      <img id="wall" src="wall.png" alt="Wall">
      <img id="window" src="window.png" alt="Window">

      <!-- DESK -->
      <img id="desk" src="desk1.png" alt="Desk">
      <img id="breakpoint" src="breakpoint.png" alt="boardwalk ticket">

      <!-- MONITOR -->
      <div id="monitor-wrapper">
        <img id="monitor-shell" src="computer.png" alt="Monitor">
        <img id="monitor-on" src="monitoron.png" alt="Monitor On">
        <div id="monitor-screen" class="off"><div id="output"></div></div>

  <!-- Monitor overlay for Desk One -->
<div id="monitor-overlay-one" class="monitor-overlay hidden"></div>

<!-- Monitor overlay for Desk Other -->
<div id="monitor-overlay-other" class="monitor-overlay hidden"></div>
<div id="monitor-video-overlay" class="monitor-overlay-video">
  <video id="video-rickroll" class="monitor-video" autoplay controls></video>
  <!-- other videos as them come here-->
</div>

      </div>

      <!-- INPUT -->
      <img id="input-bg" src="textframe.png" alt="Input Bar Background">
      <img id="input-bar" src="textbar.png" alt="Input Bar">
      <input type="text" id="real-input" placeholder=" ">

      <img id="submit-red" src="redbutton.png" alt="Submit Button">
      <img id="submit-green" src="greenbutton.png" alt="Submit Button Green" class="hidden">



   

  <!-- AUDIOOOOOO!!! -->
  <audio id="thunder-audio" src="assets/audio/thunder-audio.mp3" preload="auto"></audio>

  <!-- Ambient Audio Speicifcally, yes I'm separating them *dear self, you fucked thisup. they're currently stacked. but it works so worry about this in the future or maybe don't...*-->
<audio id="ambient-one" src="assets/audio/one-ambient.mp3" preload="auto" loop></audio>
<audio id="ambient-other" src="assets/audio/other-ambient.mp3" preload="auto" loop></audio>



  <!-- IF YOU'RE IN HERE YOU'RE NOSY AS FUCK. STOP IT!!!!! STOP DOING THAT!!! BEHAVE!!!! -->

      <!-- INFO MODAL -->
<div id="info-modal" class="hidden">
  <div class="modal-content">

    <button id="modal-close">✕</button>

    <img id="modal-image" src="" alt="">

    <div id="modal-text"></div>

  </div>
</div>
      
      
<!-- JS -->
<script>
document.addEventListener('DOMContentLoaded', () => {

  // --- DOM ELEMENTS ---
  const ambientOne = document.getElementById('ambient-one');
  const ambientOther = document.getElementById('ambient-other');

  const input = document.getElementById('real-input');
  const redBtn = document.getElementById('submit-red');

  const thunderAudio = new Audio('assets/audio/thunder-audio.mp3');
  thunderAudio.volume = 0.3;

  let ambientStarted = false;


  // --- POPUP DATA ---
  const modalData = {

    tweek: {
      image: "assets/popups/tweek.png",
      text: "The Resonant"
    },

    craig: {
      image: "assets/popups/craig.png",
      text: "Bearer of Calm"
    },

    wendy: {
      image: "assets/popups/wendy.png",
      text: "Maiden of Silence"
    }

    // add more entries here

  };


  // --- AMBIENT AUDIO ---
  function startAmbient() {

    if (ambientStarted) return;

    ambientStarted = true;

    ambientOne.volume = 0.1;
    ambientOther.volume = 0.1;

    ambientOne.play().catch(() => {});
    ambientOther.play().catch(() => {});

    scheduleThunder();
  }


  // --- RANDOM THUNDER ---
  function scheduleThunder() {

    const randomDelay = Math.random() * 30000 + 10000;
    // 10-40 seconds

    setTimeout(() => {

      thunderAudio.volume = Math.random() * 0.5 + 0.3;
      thunderAudio.currentTime = 0;

      thunderAudio.play().catch(() => {});

      scheduleThunder();

    }, randomDelay);

  }


  // Start audio after first interaction
  document.addEventListener('click', startAmbient, { once: true });


  // --- SUBMIT BUTTON ---
  redBtn.addEventListener('click', () => {

    const normalized =
      input.value.trim().toLowerCase();

    const popup =
      modalData[normalized];


    if (!popup) {

      document.getElementById('output').textContent =
        '[INPUT NOT FOUND.]';

      showModal(
        "assets/popups/not-found.png",
        "[INPUT NOT FOUND.]"
      );

      input.value = '';
      return;

    }


    document.getElementById('output').textContent = '';

    showModal(
      popup.image,
      popup.text
    );


    input.value = '';

  });



  // --- MODAL ---
  function showModal(imageSrc, text) {

    document.getElementById("modal-image").src = imageSrc;

    document.getElementById("modal-text").innerHTML = text;

    document
      .getElementById("info-modal")
      .classList.remove("hidden");

  }


  function closeModal() {

    document
      .getElementById("info-modal")
      .classList.add("hidden");

  }


  document
    .getElementById("modal-close")
    .addEventListener("click", closeModal);



  // --- POPUPS ---
  function showPopup(elementId) {

    const existingPopup =
      document.getElementById('current-popup');

    if (existingPopup)
      existingPopup.remove();


    const popup =
      document.createElement('img');


    popup.id = 'current-popup';

    popup.src =
      `assets/shared/${elementId}-popup.png`;

    popup.style.position = 'fixed';
    popup.style.top = '30%';
    popup.style.left = '30%';
    popup.style.transform =
      'translate(-30%, -30%)';

    popup.style.zIndex = '600';
    popup.style.width = '30vw';
    popup.style.height = 'auto';
    popup.style.cursor = 'pointer';

    popup.style.boxShadow =
      '0 0 20px rgba(0,0,0,0.5)';


    popup.addEventListener('click', () => {
      popup.remove();
    });


    document.body.appendChild(popup);

  }



  // --- SOUNDS ---
  const pageCollectAudio =
    new Audio('assets/audio/page-collect.mp3');

  pageCollectAudio.volume = 0.4;


  const drawerOpenAudio =
    new Audio('assets/audio/drawer-open.mp3');

  drawerOpenAudio.volume = 0.4;



  // --- VIDEO OUTPUT ---
  const video =
    document.createElement('video');

  video.src =
    'assets/outputs/rickroll.mp4';

  video.autoplay = true;
  video.controls = true;
  video.volume = 1;



  // --- INTERACTIVE ELEMENTS ---
  const interactiveElements = [

    'rock',
    'books',
    'drawer-clickable-one',
    'crystal-ball',
    'dice',
    'pendant',
    'hummels',
    'hummels2',
    'drawer-clickable-other'

  ];


  interactiveElements.forEach(id => {

    const el =
      document.getElementById(id);


    if (!el) return;


    el.addEventListener('click', () => {

      showPopup(id);

    });

  });


});
</script>

</body>
</html>
